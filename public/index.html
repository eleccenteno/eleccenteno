<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestor de Imágenes</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container mt-5">
    <h1 class="text-center">Gestor de Imágenes</h1>

    <!-- Formulario de subida -->
    <div class="card mt-4">
      <div class="card-header">
        <h2>Subir Imágenes</h2>
      </div>
      <div class="card-body">
        <form id="upload-form">
          <div class="mb-3">
            <label for="centro-id" class="form-label">ID del Centro</label>
            <input type="number" class="form-control" id="centro-id" required>
          </div>
          <div class="mb-3">
            <label for="fecha-preventivo" class="form-label">Fecha del Preventivo</label>
            <input type="date" class="form-control" id="fecha-preventivo" required>
          </div>
          <div class="mb-3">
            <label for="usuario-id" class="form-label">ID del Usuario (opcional)</label>
            <input type="number" class="form-control" id="usuario-id">
          </div>
          <div id="drop-area" class="border rounded p-5 text-center">
            <p>Arrastra y suelta las imágenes aquí o haz clic para seleccionar</p>
            <input type="file" id="file-input" multiple class="d-none">
          </div>
          <div id="preview" class="mt-3"></div>
          <button type="submit" class="btn btn-primary mt-3">Subir</button>
        </form>
      </div>
    </div>

    <!-- Listado de imágenes -->
    <div class="card mt-4">
      <div class="card-header">
        <h2>Imágenes Subidas</h2>
      </div>
      <div class="card-body">
        <!-- Filtros -->
        <div class="row mb-3">
          <div class="col-md-4">
            <select id="filter-propietario" class="form-select">
              <option value="">Filtrar por propietario</option>
            </select>
          </div>
          <div class="col-md-4">
            <select id="filter-año" class="form-select">
              <option value="">Filtrar por año</option>
            </select>
          </div>
          <div class="col-md-4">
            <select id="filter-centro" class="form-select">
              <option value="">Filtrar por centro</option>
            </select>
          </div>
        </div>
        <div id="image-list" class="row"></div>
        <!-- Paginación -->
        <nav>
          <ul id="pagination" class="pagination"></ul>
        </nav>
      </div>
    </div>

    <!-- Métricas -->
    <div class="card mt-4">
      <div class="card-header">
        <h2>Métricas</h2>
      </div>
      <div id="stats" class="card-body"></div>
    </div>

    <!-- Logs -->
    <div class="card mt-4 mb-5">
      <div class="card-header">
        <h2>Logs de Mantenimiento</h2>
      </div>
      <div id="logs" class="card-body"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
